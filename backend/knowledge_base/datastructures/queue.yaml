topic: queue
display_name: Queue (FIFO)
description: |
  Queue visualization demonstrating enqueue and dequeue operations (FIFO).
  Visualized as a horizontal row or vertical column with head and tail markers.
visual_structure: queue
template_path: templates/queue.py
scene_class: QueueScene
sample_input: [10, 20, 30]
