complexity:
  time: "O(1) per operation (amortized)"
  space: "O(n)"
tags:
  - data_structure
  - queue
prerequisites:
  - arrays
fallback_to_dynamic: false
notes: "`queue.py` should visualize head/tail pointers; useful for BFS teaching."